---
- name: Configure Database Tier
  hosts: web3
  become: yes
  tasks:
    - name: Open MySQL to external connections (Networking)
      lineinfile:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'

    - name: Restart MySQL to apply network changes
      service:
        name: mysql
        state: restarted

    - name: Provision Database, User, and Data
      shell: |
        mysql -e "CREATE DATABASE IF NOT EXISTS enterprise_db;"
        mysql -e "CREATE USER IF NOT EXISTS 'db_user'@'%' IDENTIFIED BY 'Admin123!';"
        mysql -e "GRANT ALL PRIVILEGES ON enterprise_db.* TO 'db_user'@'%';"
        mysql -e "FLUSH PRIVILEGES;"
        mysql -e "CREATE TABLE IF NOT EXISTS enterprise_db.fleet (id INT AUTO_INCREMENT PRIMARY KEY, node_name VARCHAR(50), status VARCHAR(20));"
        mysql -e "INSERT IGNORE INTO enterprise_db.fleet (id, node_name, status) VALUES (1, 'web1', 'ONLINE'), (2, 'web2', 'ONLINE'), (3, 'web3', 'ONLINE');"
